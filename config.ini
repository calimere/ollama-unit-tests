# Configuration pour le générateur de tests unitaires
# Ce fichier peut être utilisé pour personnaliser le comportement du générateur

[ollama]
# Configuration de l'API Ollama
host = localhost:11434
model = llama3:8b
timeout = 120
temperature = 0.1
max_tokens = 8000

[generation]
# Configuration de la génération de tests
include_docstrings = true
include_type_hints = true
include_edge_cases = true
include_error_cases = true
use_fixtures = true
use_mocks = true

[exclusions]
# Répertoires et fichiers à exclure
exclude_dirs = __pycache__, .git, venv, env, .venv, .pytest_cache, node_modules, dist, build
exclude_files = __init__.py, setup.py, conftest.py

[output]
# Configuration de la sortie
output_format = pytest
include_header = true
include_imports = true
test_prefix = test_

[prompts]
# Personnalisation des prompts (optionnel)
# system_prompt = "Votre prompt système personnalisé..."
# user_prompt_template = "Votre template de prompt utilisateur..."